<svg xmlns="http://www.w3.org/2000/svg" width="720" height="260" viewBox="0 0 720 260" font-family="Arial, sans-serif">
  <style>
    .box { fill:#eef2ff; stroke:#4f46e5; stroke-width:1.5; }
    .arrow { marker-end: url(#arrow); stroke:#111827; stroke-width:1.6; fill:none; }
    .label { font-size:14px; fill:#111827; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
  </defs>

  <rect x="30" y="40" width="150" height="60" rx="10" class="box"/>
  <text x="55" y="75" class="label">Checkout UI</text>

  <rect x="240" y="40" width="150" height="60" rx="10" class="box"/>
  <text x="255" y="75" class="label">API /payment</text>

  <rect x="450" y="40" width="150" height="60" rx="10" class="box"/>
  <text x="470" y="75" class="label">Razorpay Order</text>

  <rect x="240" y="150" width="150" height="60" rx="10" class="box"/>
  <text x="257" y="185" class="label">Webhook /payment/webhook</text>

  <rect x="30" y="150" width="150" height="60" rx="10" class="box"/>
  <text x="60" y="185" class="label">Order DB</text>

  <line x1="180" y1="70" x2="240" y2="70" class="arrow"/>
  <text x="190" y="60" class="label">create-order</text>

  <line x1="390" y1="70" x2="450" y2="70" class="arrow"/>
  <text x="400" y="60" class="label">Razorpay order_id</text>

  <line x1="525" y1="100" x2="525" y2="150" class="arrow"/>
  <text x="535" y="130" class="label">webhook</text>

  <line x1="315" y1="210" x2="105" y2="210" class="arrow"/>
  <text x="170" y="200" class="label">update status</text>

  <line x1="105" y1="150" x2="315" y2="150" class="arrow"/>
  <text x="150" y="140" class="label">verify payment</text>

  <line x1="180" y1="180" x2="240" y2="180" class="arrow"/>
  <text x="185" y="170" class="label">signature</text>

  <line x1="525" y1="150" x2="525" y2="100" class="arrow"/>
</svg>
