<svg xmlns="http://www.w3.org/2000/svg" width="760" height="300" viewBox="0 0 760 300" font-family="Arial, sans-serif">
  <style>
    .box { fill:#ecfeff; stroke:#0ea5e9; stroke-width:1.5; }
    .db { fill:#fff7ed; stroke:#f59e0b; stroke-width:1.5; }
    .arrow { marker-end: url(#arrow); stroke:#111827; stroke-width:1.6; fill:none; }
    .label { font-size:14px; fill:#111827; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
  </defs>

  <rect x="40" y="40" width="200" height="80" rx="10" class="box"/>
  <text x="70" y="75" class="label">Next.js (App Router)</text>
  <text x="90" y="95" class="label">Redux + Tailwind</text>

  <rect x="300" y="40" width="200" height="80" rx="10" class="box"/>
  <text x="335" y="75" class="label">Express API</text>
  <text x="325" y="95" class="label">Auth, Orders, Payments</text>

  <rect x="560" y="40" width="140" height="80" rx="10" class="db"/>
  <text x="585" y="75" class="label">MongoDB</text>
  <text x="573" y="95" class="label">Mongoose Models</text>

  <rect x="300" y="170" width="200" height="80" rx="10" class="box"/>
  <text x="330" y="205" class="label">Integrations</text>
  <text x="318" y="225" class="label">Razorpay, Cloudinary, SendGrid</text>

  <line x1="240" y1="80" x2="300" y2="80" class="arrow"/>
  <text x="245" y="68" class="label">REST /api</text>

  <line x1="500" y1="80" x2="560" y2="80" class="arrow"/>
  <text x="505" y="68" class="label">Mongoose</text>

  <line x1="400" y1="120" x2="400" y2="170" class="arrow"/>
  <text x="410" y="150" class="label">SDKs/Webhooks</text>
</svg>
